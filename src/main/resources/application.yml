spring:
  application:
    name: android-shop-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: 0
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 60000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}

    open-in-view: false

    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  address: 0.0.0.0
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

  health:
    mail:
      enabled: false

logging:
  level:
    org.hibernate.SQL: info

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME}}
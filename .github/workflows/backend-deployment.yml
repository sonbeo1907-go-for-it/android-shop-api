name: Backend CI/CD

on:
  push:
    branches:
      - deployment

  workflow_dispatch:

concurrency:
  group: android-shop-api-deployment
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sonbeo1907-go-for-it/android-shop-api

jobs:
  test:
    name: Maven tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine

        env:
          POSTGRES_DB: android_shop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd
          "pg_isready -U postgres -d android_shop_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/android_shop_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

          MAIL_HOST: localhost
          MAIL_PORT: "2525"
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-placeholder
          MAIL_FROM: ci@example.com

          FRONTEND_URL: http://localhost:3000
          CORS_ALLOWED_ORIGINS: http://localhost:3000

  docker:
    name: Build and publish Docker image
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true

          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:deployment
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    needs:
      - docker

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Trigger immutable Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          IMAGE_URL: ghcr.io/sonbeo1907-go-for-it/android-shop-api:${{ github.sha }}
        run: |
          set -euo pipefail

          ENCODED_IMAGE_URL="$(
            python3 -c \
              'import os, urllib.parse; print(urllib.parse.quote(os.environ["IMAGE_URL"], safe=""))'
          )"

          if [[ "$RENDER_DEPLOY_HOOK_URL" == *"?"* ]]; then
            SEPARATOR="&"
          else
            SEPARATOR="?"
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --request POST \
            "${RENDER_DEPLOY_HOOK_URL}${SEPARATOR}imgURL=${ENCODED_IMAGE_URL}"

          echo
          echo "Render deployment triggered for ${IMAGE_URL}"